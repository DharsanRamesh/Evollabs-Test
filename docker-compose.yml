services:
  teleport:
    image: public.ecr.aws/gravitational/teleport-distroless:18.7.1
    container_name: teleport
    ports:
      - "3080:3080"   # Web UI / tsh proxy
      - "3023:3023"   # SSH proxy
      - "3025:3025"   # Auth
    volumes:
      - ./teleport/teleport.yaml:/etc/teleport/teleport.yaml:ro
      - ./teleport/data:/var/lib/teleport
      - ./teleport/resources:/etc/teleport/resources:ro
      - ./teleport/identities:/var/lib/teleport-identities
    environment:
      - TELEPORT_DIAGNOSTICS=true
    healthcheck:
      # Call teleport binary directly for status checks.
      test: ["CMD", "/usr/local/bin/teleport", "status", "--config=/etc/teleport/teleport.yaml"]
      interval: 10s
      timeout: 5s
      retries: 6

  app:
    build:
      context: ./targets/app
    container_name: teleport-demo-app
    environment:
      - APP_PORT=8000
    expose:
      - "8000"

networks:
  default:
    name: teleport-lab-net

